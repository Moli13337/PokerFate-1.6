syntax = "proto2";
package pb;
option go_package = "poker-fate-server/internal/proto/gen";

import "CSGameDef.proto";

message ItemUnit
{
    optional string item_uniq_id = 1; //物品唯一id
    optional int32 item_num = 2; //物品数量
}

message ItemListREQ
{
}

message ItemListRSP
{
    repeated ItemInfo item_list = 1; //物品列表
    repeated int32 owned_item_id_list = 2; //拥有的道具id列表(拥有过但数量为0或已过期的道具也会包含在内)
    optional int32 code = 3;
}

message ItemChangeRSP
{
    repeated ItemInfo item_list = 1; //改变了的物品列表
}

message RefreshItemREQ
{
}
message RefreshItemRSP
{
    optional int32 code = 1;
}

