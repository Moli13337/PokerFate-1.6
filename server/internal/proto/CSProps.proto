// 回收(分解)物品
message RecycleItemREQ
{
    repeated ItemUnit req_item_list = 1; // 请求回收的物品列表
}
message RecycleItemRSP
{
    optional int32 code = 1; // 所有物品回收失败时才返回错误码
    repeated RewardItemInfo reward_list = 2;
}

message ChangeAvatarREQ
{
    optional int32 item_id = 1; // 新头像的配置id
}

message ChangeAvatarRSP
{
    optional int32 code = 1;
    optional int32 item_id = 2; // 新头像的配置id
}

message ChangeFrameREQ
{
    optional int32 item_id = 1; // 新头像框的配置id, 0表示卸下头像框
}

message ChangeFrameRSP
{
    optional int32 code = 1;
    optional int32 item_id = 2; // 新头像框的配置id
}

message ChangeTitleREQ
{
    optional int32 item_id = 1; // 新称号的配置id, 0表示卸下称号
}

message ChangeTitleRSP
{
    optional int32 code = 1;
    optional int32 item_id = 2; // 新称号的配置id
}

// 修改外显装饰
message ChangeOutFitsREQ
{
    optional int32 item_type = 1; // 装饰类型
    optional int32 item_id = 2; // 新外部装饰的配置id
}

message ChangeOutFitsRSP
{
    optional int32 code = 1;
    optional int32 item_type = 2; // 装饰类型
    optional int32 item_id = 3; // 当前使用中的外部装饰的配置id
}

// 使用礼包
message TreasureUnit
{
    optional int32 major_type = 1; // 物品大类 1:道具, 2:角色, 3:角色皮肤
    optional int32 item_id = 2; //物品配置id
    optional int32 item_num = 3; //物品数量
}
message UseTreasureBoxREQ
{
    optional ItemUnit req_item = 1; // 请求使用的礼包
    repeated TreasureUnit req_reward_list = 2; // 请求的奖励列表，目前仅对自选礼包有效
}
message UseTreasureBoxRSP
{
    optional int32 code = 1;
    repeated RewardItemInfo reward_prop_list = 2; // 道具奖励列表
    repeated RewardItemInfo reward_skin_list = 3; // 皮肤奖励列表
    repeated RewardItemInfo reward_role_list = 4; // 角色奖励列表
}

// 使用加经验的道具
message UseExpItemREQ
{
    optional ItemUnit req_item = 1; // 请求使用的经验物品
}
message UseExpItemRSP
{
    optional int32 code = 1;
    optional int32 exp_inc = 2; // 增加的经验值
}

////////////////////////////////////////////////////////////////////
// 自定义装饰方案
message DCSchemeItem
{
    optional string scheme_id = 1; // 装饰方案id, 使用uuid生成
    optional int32 skin_id = 2;
    optional int32 lobby_scene_id = 3; // 大厅场景的配置id
    repeated int32 lobby_bgm_list = 4; // 大厅背景音乐的配置id列表
    optional int32 create_at = 5; // 方案创建的时间戳
    repeated int32 property_list = 6; // 属性列表
    optional int32 title = 7;//称号
    optional int32 frame = 8;//头像框
    optional int32 avatar = 9;//头像
}

// 保存装饰方案
message SaveDCSchemeREQ
{
    optional int32 operation_type = 1; // 操作类型 0:新增 1:修改
    optional string scheme_id = 2[default = ""]; // 装饰方案id, 新增方案时该字段可不填
    optional int32 skin_id = 3; // 皮肤id, 如果有修改则传入新值,否则传入当前值
    optional int32 lobby_scene_id = 4; // 大厅背景音乐的配置id列表, 如果有修改则传入新值,否则传入当前值
    repeated int32 lobby_bgm_list = 5; // 大厅背景音乐的配置id, 如果有修改则传入新值,否则传入当前值
    repeated int32 property_list = 6; // 属性列表, 如果有修改则传入新值,否则传入当前值
    optional bool set_as_using = 7; // 是否设置为当前使用的方案
    optional int32 title = 8;//称号
    optional int32 frame = 9;//头像框
    optional int32 avatar = 10;//头像
    
}
message SaveDCSchemeRSP
{
    optional int32 code = 1;
    optional DCSchemeItem scheme = 2; // 新增或修改后的装饰方案
    optional bool set_as_using = 3; // 是否设置为当前使用的方案
}

// 获取装饰方案列表
message GetDCSchemeREQ
{

}
message GetDCSchemeRSP
{
    optional int32 code = 1;
    repeated DCSchemeItem scheme_list = 2; // 大厅装饰方案列表
    optional string using_decoration_scheme = 3; // 当前使用的装饰方案id      
    optional int32 rand_dc_scheme_flag = 4; // 是否随机装饰方案 0:不随机 1:随机
    repeated string lobby_rand_schemes = 5; //大厅随机方案id列表
    optional string lobby_specify_scheme = 6; //指定方案id
    repeated RoomDCScheme room_scheme_list = 7; //房间装饰方案列表
    repeated string room_rand_schemes= 8; //随机方案id列表
    optional string room_specify_scheme = 9; //指定方案id
    optional int32 room_mode = 10; //模式  1-随机 0-指定
}

// 删除装饰方案,使用中的方案不能删除
message DeleteDCSchemeREQ
{
    optional string scheme_id = 1;
    optional int32 type = 2;//1大厅 2房间
}
message DeleteDCSchemeRSP
{
    optional int32 code = 1;
    optional string scheme_id = 2; // 被删除的装饰方案id
    optional int32 type = 3;//1大厅 2房间
    optional string specify_scheme = 4;//指定方案id
    repeated string rand_schemes = 5;//随机方案如果为空或者长度为0则不更新
    optional string using_decoration_scheme = 6;//大厅正在使用方案为空或者为0则不更新
}

// 切换使用的装饰方案 1.5.7后废弃
message ChangeUsingDCSchemeREQ
{
    optional string scheme_id = 1;
}
message ChangeUsingDCSchemeRSP
{
    optional int32 code = 1;
    optional string scheme_id = 2; // 当前使用的装饰方案id
}

// 更新是否随机方案标志 1.5.7后废弃
message UpdateDCSchemeRandFlagREQ
{
    optional int32 random_scheme_flag = 1; // 是否随机方案 0:不随机 1:随机
}
message UpdateDCSchemeRandFlagRSP
{
    optional int32 code = 1;
    optional int32 random_scheme_flag = 2; // 是否随机方案 0:不随机 1:随机
}

message RoomDCScheme {
    optional string scheme_id = 1; // 方案ID
    optional string name = 2;      // 方案名称
    optional int32 create_at = 3;  // 方案创建的时间戳
    optional int32 rand = 4;       // 2进制 是否随机 0-不随机 1-随机 ROOM_RAND_DECORATION_TYPE 0音乐 1 all in 2 铭牌动效 3牌面 4 牌桌 5 牌背
    repeated int32 emojis = 5;    // 表情列表
    repeated int32 title = 6;     // 称号列表
    repeated int32 table = 7;     // 牌桌列表
    repeated int32 card_back = 8; // 牌背列表
    repeated int32 card_front = 9; // 牌面列表
    repeated int32 all_in_animation = 10; // all in动效列表
    repeated int32 bgm_list = 11; // 背景音乐列表
    repeated int32 skin_id = 12;  //皮肤列表
    repeated int32 show_card = 13;//铭牌动效
    repeated int32 open_card = 14;//开牌特效
}

message SetSchemeNameREQ {
    optional string name = 1;
    optional string scheme_id = 2;
}
message SetSchemeNameRSP {
    optional int32 code = 1;
    optional string name = 2;
    optional string scheme_id = 3;
}

//局内装饰保存请求
message SaveRoomDCSchemeREQ
{
    optional int32 operation_type = 1; // 操作类型 0:新增 1:修改
    optional RoomDCScheme scheme = 2;//
}
message SaveRoomDCSchemeRSP
{
    optional int32 code = 1;
    optional int32 operation_type = 2; // 操作类型 0:新增 1:修改
    optional RoomDCScheme scheme = 3;//
}

message SetSchemeInfoREQ
{
    optional int32 type = 1;    //1大厅 2房间
    optional int32 mod_type = 2;//0:不随机 1:随机
    repeated string schemes = 3;//选择方案列表 scheme_id
}
message SetSchemeInfoRSP
{
    optional int32 code = 1;
    optional int32 type = 2;    //1大厅 2房间
    optional int32 mod_type = 3;//0:不随机 1:随机
    repeated string schemes = 4;//选择方案列表 scheme_id
    optional string specify_scheme = 5;//指定方案id 有则更新
}

//装饰方案更新通知
message SchemeChangeBRC
{
    repeated DCSchemeItem scheme_list = 1; // 大厅装饰方案列表 有则更新
    repeated RoomDCScheme room_scheme_list = 2; //房间装饰方案列表 有则更新
}

// 设置房间内动效播放
//1 All In动效  2 明牌动效 3 牌面
message ChangeAnimationREQ
{
    optional int32 ftype = 1;   //动效类型
    optional int32 item_id = 2; // 动效id, 0表示卸下
}
message ChangeAnimationRSP
{
    optional int32 code = 1;
    optional int32 ftype = 2;   //动效类型
    optional int32 item_id = 3; //动效id, 0表示卸下
}

