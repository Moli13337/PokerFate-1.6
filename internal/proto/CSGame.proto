syntax = "proto2";
package pb;
option go_package = "poker-fate-server/internal/proto/gen";

import "CSGameDef.proto";


message UserLoginREQ
{
    optional int64 uid = 1;
    optional string key = 2;
    optional string ver = 3;
    optional int32 chnl = 4; // 渠道id
}

message UserLoginRSP
{
    optional int32 code = 1;
    optional string reason = 2; //失败原因
    optional int32 server_timestamp = 3;

    optional int32 pos = 4; // 当前排队位置(仅code=1002时有效)
    optional int32 est_wait_time = 5; // 预计等待时间(仅code=1002时有效)，单位秒
}

message UserLogoutREQ
{
}

message UserLogoutRSP
{
    optional int32 code = 1;
    optional string reason = 2;
}

//请求自己用户信息，返回UserBrief
message SelfUserInfoREQ
{
}

message SelfUserInfoRSP
{
    optional UserBrief brief = 1;
    optional string country = 2;
    optional string sex = 3;
    optional string plat = 4; // 平台
    optional int32 exp = 5; // 升级到下一个等级积累的经验值
    repeated int32 unlock_modules = 6; // 已解锁模块列表
    repeated UserFavoriteRole favorite_roles = 7; // 喜爱的角色
    optional string declaration = 8; // 个人宣言
    optional int32 using_card_back = 9; // 当前使用中的牌背
    optional int32 using_table = 10; // 当前使用中的牌桌
    optional int32 using_lobby_music = 11; // 当前使用中的大厅音乐
    optional int32 using_battle_music = 12; // 当前使用中的战斗音乐
    optional int32 using_lobby_scene = 13; // 当前使用中的大厅场景
    optional string auth_cert_url = 14; // 七日任务的证书图片url
    optional int32 newer_guide_step = 15; // 新手引导进度
    optional int64 register_time = 16; // 注册时间，秒级时间戳
    optional int64 auth_cert_time = 17; // 七日任务的认证时间，秒级时间戳
    optional int32 vip_level = 18; // vip等级
    optional string using_decoration_scheme = 19; // 当前使用的装饰方案ID, 已废弃
    optional int32 rand_dc_scheme_flag = 20; // 是否随机装饰方案 0:不随机 1:随机, 已废弃
    optional string client_def_str = 21;     //前端自身定义数据
    optional int32 monthly_card_exp = 22; // 月卡过期时间戳
    optional int32 emoji_free_times = 23;//免费互动表情剩余次数
}
//请求自己用户信息，返回UserBrief
message SetClientDefStrREQ
{
    optional string client_def_str = 1;     //前端自身定义数据
}
message SetClientDefStrRSP
{
    optional int32 code = 1;     
}

// 请求自己的战绩信息
message SelfAchievementsREQ
{
}
message SelfAchievementsRSP
{
    optional UserAchievements achievements = 1; // 战绩信息
}

// 请求其他人的个人信息
message GetOtherDetailInfoREQ
{
    optional int64 the_uid = 1; // 要查询的用户id
}

message AchievementCount
{
    optional int32 level = 1;//成就等级
    optional int32 num = 2;//成就数量
}

message GetOtherDetailInfoRSP
{
    optional int32 code = 1;
    optional UserBrief brief = 2; // 用户简要信息
    optional string declaration = 3; // 个人宣言
    repeated UserFavoriteRole favorite_roles = 4; // 喜爱的角色
    optional UserAchievements achievements = 5; // 用户战绩信息
    optional UserCollections collections = 6; // 用户收藏信息
    optional int32 skin_id = 7; // 当前使用的角色皮肤id
    optional string auth_cert_url = 8;
    optional int64 register_time = 9; // 注册时间，秒级时间戳
    optional int64 auth_cert_time = 10; // 七日任务的认证时间，秒级时间戳
    repeated AchievementCount counts = 11;//成就统计
}

message HeartBeatREQ
{
}

message HeartBeatRSP
{
    optional int32 server_timestamp = 1;
}

message GetServerTimeREQ
{
}
message GetServerTimeRSP
{
    optional int32 server_timestamp = 1;
}

message ServerStopBRC
{
}

message NoticeBRC
{
    optional string message = 1;
    optional int32 type = 2; // 消息类型，参考《客户端推送常量.xlsx》
    repeated int64 to_uids = 3; //限制uid, 内部用
}

message UserLocationRSP
{
    optional int32 roomid = 1;
    optional int32 game_type = 2;
}

//座位状态广播
message SeatStatusBRC
{
	optional int32 seatid = 1;
	optional bool seat_reserve = 2;  // 留座
}

message ReserveSeatREQ
{
	optional bool reserve = 1; // false表示回到座位
}

message ReserveSeatRSP
{
	optional int32 code = 1;  //失败 -1
	optional bool reserve = 2; //当前状态
}

message EnterRoomREQ  //进入房间
{
    optional int32 roomid = 1;
    optional int32 tid = 2 [default = 1]; //mtt可以指定tid
    optional int64 uid = 3;
    optional int64 byin_chips = 4[default = 0]; // 坐下时带入的筹码
    optional string client_str = 5; //客户端请求携带的信息
    optional int64 default_byin = 6; // 默认买入, 用于自动补码
    optional bool is_observer = 7; // 是否以围观身份进入, true:围观进入  false:正常进入
    optional int64 uid_being_observed = 8[default = 0]; // 指定围观玩家的视角
}

message EnterRoomRSP
{
    optional int32 code = 1[default = 0];
    optional string reason = 2[default = ""];
    optional int32 roomid = 3[default = 0];
    optional int32 user_num = 4; // 房间人数
    optional int32 game_type = 5;
    optional int32 old_room_id = 6[default = 0];
    optional TableStatus table_status = 7;
    optional RoomStatus room_status = 8;
    optional PlayingStatus playing_status = 9;
    optional RoomInfo room_info = 10;
    optional FriendRoomInfo friend_room_info = 11; // 好友房信息
    optional string client_str = 12; //客户端请求携带的信息
    optional SngRoomInfo sngroom_info = 13;
    optional MttRoomInfo mttroom_info = 14;
    optional int32 seatid_being_observed = 15; // 被围观的玩家座位id, -1表示正常进入，>=0表示围观
    optional DCSchemeRoomItem scheme = 16;//局内装饰方案
}

message OtherEnterRoomBRC   //其他玩家进入房间
{
    optional UserBrief user = 1;
    optional int32 num = 2;
    optional int32 player = 3;		// 总在玩数量
    optional int32 rb_num = 4[default = 0];
}

message ChangeTableRSP
{
    optional int32 code = 1;
    optional TableStatus table_status = 2;
    optional RoomStatus room_status = 3;
    optional PlayingStatus playing_status = 4; //玩家在坐会发
    optional MttRoomInfo mttroom_info = 5; // mtt房间信息
    optional int32 seatid_being_observed = 6; // 被围观的玩家座位id, -1表示正常进入，>=0表示围观
    optional bool is_assign_table = 7; // 是否重新分配牌桌
}

// 切换围观视角
message ChangeObserveViewREQ
{
    optional int32 tid = 1; // 牌桌ID, MTT使用, 其他玩法忽略
    optional int32 seatid_being_observed = 2; // 要切换的围观目标座位id, -1表示由服务端确定视角(MTT使用)
}
message ChangeObserveViewRSP
{
    optional int32 code = 1;
    optional int32 tid = 2; // 牌桌ID
    optional int32 seatid_being_observed = 3; // 当前的围观目标座位id
}

// 用于客户端从后台切换回来后重新拉取房间数据
message GetRoomDataREQ
{
    optional int32 roomid = 1;
}
message GetRoomDataRSP
{
    optional int32 code = 1;
    optional int32 roomid = 2;
    optional int32 game_type = 3;
    optional TableStatus table_status = 4;
    optional RoomStatus room_status = 5;
    optional PlayingStatus playing_status = 6;
    optional RoomInfo room_info = 7;
    optional FriendRoomInfo friend_room_info = 8; // 好友房信息
    optional SngRoomInfo sngroom_info = 9;
    optional int32 seatid_being_observed = 10; // 被围观的玩家座位id, -1表示正常进入，>=0表示围观
    optional MttRoomInfo mttroom_info = 11;
}

message OtherLeaveRoomBRC
{
    optional int64 uid = 1;
    optional int32 num = 2;
    optional int32 player = 3;		// 总在玩数量
    optional int32 roomid = 4;
    optional int32 rb_num = 5[default = 0];  // 机器人数量
}

message LeaveRoomREQ //离开房间
{
    optional bool seat_reserve = 1 [default = false]; // false、不留座    true、留座
    optional string client_str = 2; //客户端请求携带的信息
    optional bool back_wait  =  3; //sgn专用,是否返回大厅等待 true 返回
}

message LeaveRoomRSP
{
    optional int32 code = 1;
    optional string reason = 2;
    optional int32 roomid = 3;
    optional BondSettleInfo bond_settle_info = 4; // 好感度结算信息
    optional string client_str = 5; //客户端请求携带的信息
    optional PlaySummary summary = 6;
    optional int32 game_type = 7;
    optional OverBondSettleInfo over_bond_settle_info = 8;//超出好感度结算信息
    optional bool back_wait  =  9; //sgn专用,是否返回大厅等待 true 返回
}

message StandUpREQ
{
}

message StandUpRSP
{
    optional int32 code = 1;
    optional string reason = 2;
    optional int32 duration = 3; // 游戏时长
}

message StandUpBRC
{
    optional int32 seatid = 1;
}

// 设置或取消下一轮离开房间
message DelayLeaveRoomREQ
{
    optional bool flag = 1; // true:设置下一手牌离开  false:取消下一手牌离开
}

message DelayLeaveRoomRSP
{
    optional int32 code = 1;
    optional bool flag = 2; // 当前设置状态
}

message SitDownREQ //坐下
{
    optional int32 seatid = 1;
    optional int64 chips = 2;  // 玩家请求带入的筹码
    optional bool wait_blind = 7[default = false];   //是否等待大盲位再加入poker牌局 false:支付大盲立刻加入  true:等到大盲位再加入
}

message SitDownRSP
{
    optional int32 code = 1;
    optional int32 seatid = 2 [default = -1];
    optional int64 chips = 3 [default = 0];
}

message SitDownBRC
{
    optional SeatStatus status = 4;
}

message FaceREQ  //发表情
{
    optional int32 id = 1; // 表情id
}

message FaceBRC
{
    optional int32 code = 1;
    optional int32 seatid = 2;
    optional int32 id = 3;
}

message TextREQ
{
    optional int32 id = 1; // 快捷聊天id
}

message TextRSP
{
    optional int32 code = 1;
}

message TextBRC
{
    optional int32 seatid = 1;
    optional int32 id = 2;
}

message CustomTextREQ
{
    optional string text = 1; // 自定义聊天内容
}
message CustomTextBRC
{
    optional int32 seatid = 1; // 发送者座位号
    optional string text = 2; // 自定义聊天内容
}

message TableInfoREQ
{
    optional int64 uid = 1;
}

message TableInfoRSP
{
    optional int64 uid = 1;
    optional int64 coin = 2[default = 0]; // 玩家剩余金币
    optional int64 chips = 3[default = 0];// 玩家剩余筹码
}

message QuickStartREQ
{
    optional int64 boot = 1; // poker bb
    optional int32 game_type = 2;
    optional int32 lobby_coin = 3;
    optional int64 byin_chips = 4[default = 0]; // 坐下时带入的筹码
    optional bool wait_blind = 5[default = false]; //是否等待大盲位再加入poker牌局 false:支付大盲立刻加入  true:等到大盲位再加入
    optional string ip = 6;
    optional int64 default_byin = 7; // 默认买入, 用于自动补码
    optional DCSchemeRoomItem scheme = 8;//切桌的时候使用
}

message QuickStartRSP
{
    optional int32 code = 1[default = 0];
    optional int32 game_type = 2;
    optional int64 boot = 3;
    optional int32 lobby_coin = 4;
}

// 申请解锁新模块
message UnlockNewModuleREQ
{
    repeated int32 ids = 1; // 模块id列表
}
message UnlockNewModuleRSP
{
    repeated int32 success_ids = 1; // 本次成功解锁的模块id列表
    repeated int32 fail_ids = 2; // 本次失败解锁的模块id列表
}

message ExpChangeRSP
{
    optional uint32 level = 1;      // 当前等级
    optional uint32 exp = 2;        // 当前经验
    optional uint32 exp_inc = 3;    // 经验增长
    optional int64 reward = 4;      // 升级奖励
}

message LevelUpBRC
{
    optional int64 uid = 1;
    optional uint32 level = 2;      // 当前等级
}

// 设置牌桌标志的请求
message SetTableFlagREQ
{
    optional int32 is_auto_byin = 1[default = 0]; //是否自动买入 0:未不设置 1:不自动买入 2:自动买入
}
message SetTableFlagRSP
{
    optional int32 code = 1;
}

// 屏蔽聊天请求和响应
message SetBlockChatREQ
{
    optional int64 the_uid = 1; // 被操作的uid
    optional bool is_block = 2; // 是否屏蔽，true-屏蔽，false-取消屏蔽
}
message SetBlockChatRSP
{
    optional int32 code = 1;
    optional bool is_block = 2; // 是否被屏蔽，true-被屏蔽，false-未被屏蔽
    optional int64 the_uid = 3; // 被操作的uid
    optional int64 block_end_time = 4; // 屏蔽结束时间,秒级时间戳
}
message GetBlockChatListREQ
{
}
message GetBlockChatListRSP
{
    repeated BlockChatItem list = 1; // 被屏蔽的玩家列表
}

// 获取房间买入界面展示的获胜奖励
message RoomWinnerRewardsItem
{
    optional int32 room_lvl = 1;
    optional int32 fire_power = 2[default = 0]; // 火力值
    optional int32 win_exp = 3[default = 0]; // 胜利经验
    optional int32 bond_add = 4[default = 0]; // 好感度
}
message RoomWinnerRewardsInfoREQ
{
    optional int32 game_type = 1;
}
message RoomWinnerRewardsInfoRSP
{
    optional int32 code = 1;
    optional int32 game_type = 2;
    repeated RoomWinnerRewardsItem reward_list = 3; // 房间奖励列表
}

// 获取破产保护信息
message BustProtectInfoREQ
{
}
message BustProtectInfoRSP
{
    optional int32 code = 1;
    optional int32 left_times = 2; // 剩余破产保护次数
    optional int64 reward_chips = 3; // 破产保护奖励筹码, 0表示没有奖励, 大于0表示有可领取的奖励
}

// 领取破产保护奖励
message BustProtectRewardREQ
{
}
message BustProtectRewardRSP
{
    optional int32 code = 1;
    optional int64 reward_chips = 2; // 破产保护奖励筹码
}

//////////////////////////////////////////////////////
// 好友房相关
message CreateFriendRoomREQ
{
    optional int32 game_type = 1;
    optional int32 seat_num = 2; // 座位数
    optional int64 bb = 3; // 大盲
    optional int64 min_byin = 4; // 最小买入
    optional int64 max_byin = 5; // 最大买入
    optional int32 action_time = 6; // 行动时间
    optional bool is_forbid_chat = 7; // 是否禁止聊天, true:禁止聊天，false:允许聊天
    optional bool is_private = 8; // 是否为私人房, true:私人房，false:公共的好友房 
    optional int32 blind_id = 9; //盲注id
    optional int32 up_blind_time = 10;//涨盲时间
    optional bool open_observer  = 11 ;//明牌围观 true 明牌围观 false不明牌围观
    optional int32 think_time = 12;//思考时间(时间银行)
    optional int32 begin_chips = 13;//起始筹码
}

message CreateFriendRoomRSP
{
    optional int32 code = 1;
}

// 请求加入好友房,返回消息是EnterRoomRSP
message JoinFriendRoomREQ
{
    optional int32 roomid = 1; // 房间id
    optional bool is_observer = 2; // 是否以围观身份进入, true:围观进入  false:正常进入
}

message FriendRoomItem
{
    optional int32 roomid = 1;
    optional int32 game_type = 2;
    optional int32 seat_num = 3; // 座位数
    optional int32 sited_num = 4; // 已坐人数
    optional int64 bb = 5; // 大盲
    optional int64 min_byin = 6; // 最小买入
    optional int64 max_byin = 7; // 最大买入
    optional UserBrief owner = 8; // 房主信息
    optional int32 begin_chips = 9;//起始筹码
    optional bool open_observer  = 10 ;//明牌围观 true 明牌围观 false不明牌围观
    optional int32 blind_id = 11; //盲注id
    optional bool is_in_room = 12; //true是在房间、false不在
}
message FriendRoomListREQ
{
}
message FriendRoomListRSP
{
    repeated FriendRoomItem room_list = 1; // 好友房列表
}

// 好友房即将解散的广播
message FriendRoomWillDisbandBRC
{
}
// 好友房解散的广播
message FriendRoomDisbandBRC
{
}

message InvitePlayREQ
{
    optional int64 to_uid = 1; // 被邀请者uid
}

message InvitePlayRSP
{
    optional int32 code = 1;
    optional int64 to_uid = 2; // 被邀请者uid
}

message InvitePlayBRC
{
    optional string inviter_name = 1; // 邀请者昵称
    optional int32 roomid = 2; // 房间id
    optional int32 game_type = 3; // 游戏类型
    optional int64 inviter_uid = 4; // 邀请者的uid
}
message FriendRoomOwnerChangeBRC 
{
    optional UserBrief owner = 1; // 房主信息
}
//////////////////////////////////////////////////////

// 获取Allin玩法的开始与结束时间
message GetAllinGameTimeREQ
{
}
message GetAllinGameTimeRSP
{
    optional int32 start_time = 2; // 开放时间，秒级时间戳
    optional int32 end_time = 3; // 结束时间，秒级时间戳
}

message SetNewerGuideStepREQ
{
    optional int32 step = 1; // 新手引导进度
}
message SetNewerGuideStepRSP
{
    optional int32 code = 1;
    optional int32 step = 2; // 当前新手引导进度
}

//////////////////////////////////////////////////////
message GetUserLevelInfoREQ
{
}
message GetUserLevelInfoRSP
{
    optional int32 code = 1;
    optional int32 hands = 2; // 今日已增加经验的手牌数量
    optional int32 reset_time = 3; // 手牌数量重置时间，秒级时间戳
    optional int32 sng_hands = 4; // 今日已增加经验的sng场次
    optional int32 mtt_hands = 5; // 今日已增加经验的mtt场次
}

message GetUserBondInfoREQ
{
}
message GetUserBondInfoRSP
{
    optional int32 code = 1;
    optional int32 hands = 2; // 今日已增加好感度的手牌数量
    optional int32 sng_hands = 3; // 今日已增加好感度的sng场次
    optional int32 mtt_hands = 4; // 今日已增加好感度的mtt场次
}

//////////////////////////////////////////////////////
// 登录排队相关
// 取消登录排队
message CancelLoginQueueREQ
{
}
message CancelLoginQueueRSP
{
    optional int32 code = 1;
}

// 登录排队状态变更广播
message LoginQueueStatusChangeBRC
{
    optional int32 pos = 1; // 当前排队位置
    optional int32 est_wait_time = 2; // 预计等待时间，单位秒
}
//////////////////////////////////////////////////////
// 比赛相关
// 比赛排名项
message TourRankItem
{
    optional int32 rank = 1; // 排名
    repeated ItemIdUnit reward_item_list = 2; // 奖励道具列表
    optional UserBrief brief = 3; // 玩家简要信息
    optional int64 chips = 4; // 玩家剩余筹码
    optional int32 seat_index = 5; // sng等于seatid，mtt从0开始增长
}

message SngListItem
{
    optional int32 tour_id = 1;
    optional string tour_name = 2; // 赛事名称
    optional int32 style_id = 3; // 赛事图标样式ID
    repeated ItemIdUnit sign_item_list = 4; // 可选择的报名道具列表
    optional int32 seat_num = 5; // 最大参赛人数
    optional int32 roomid = 6; // 比赛房间ID, tour_status为2、4时有效
    optional int32 tour_status = 7; // 赛事状态, 0:未报名 1:已报名等待开赛 2:进行中 3:已结束 4:比赛进行中且玩家已被淘汰
    optional int32 cur_sign_num = 8; // 当前报名人数
    optional int32 game_type = 9;
    optional int32 room_start_time = 10; // sng房间游戏开始时间, 秒级时间戳, 用于排序, tour_status为3时有效
    optional int32 event_id = 11; // 赛事活动ID
    repeated ItemIdUnit event_reward_list = 12; // 赛事活动道具奖励
    optional int32 my_rank = 13; // 我的排名, tour_status为3时有效
    optional string setid = 14; // 用于查询已结束的比赛
    optional int64 byin_chips = 15; // 报名消耗的筹码价值
    optional int32 level = 16;      //限制等级
    optional int32 sort_value = 17; // 排序值
}

// 请求赛事列表
message TourListREQ
{
    optional int32 req_type = 1; // 请求类型 1:我的比赛 2:sng 3:mtt
    optional string lang = 2; // 语言
}
message TourListRSP
{
    optional int32 code = 1;
    optional int32 req_type = 2;
    repeated SngListItem sng_list = 3; // sng列表, 不包含历史比赛
    repeated MttListItem mtt_list = 4; // mtt列表, 不包含历史比赛
}

message TourHistoryListREQ
{
    optional int32 req_type = 1; // 请求类型 1-所有比赛 2:sng 3:mtt
    optional int32 room_start_time = 2; // sng房间游戏开始时间(秒级时间戳), 用于分页查询, 查询start_time之前的比赛(不包含start_time), 0表示从最新的比赛开始查询
    optional string lang = 3; // 语言
}
message TourHistoryListRSP
{
    optional int32 code = 1;
    repeated SngListItem history_sng_list = 2; // 历史sng比赛列表
    optional int32 req_type = 3;
    repeated MttListItem history_mtt_list = 4; // 历史mtt比赛列表
}

message SngDetailInfo
{
    optional int32 tour_id = 1; // 赛事唯一ID
    optional string tour_name = 2; // 赛事名称
    optional int32 style_id = 3; // 赛事图标样式ID
